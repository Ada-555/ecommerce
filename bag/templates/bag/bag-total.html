<div class="bag-summary">
    <div class="d-flex justify-content-between text-white mb-1">
        <span>Bag Total</span>
        <span class="fw-medium">€{{ total|floatformat:2 }}</span>
    </div>
    <div class="d-flex justify-content-between text-white mb-1">
        <span>Delivery</span>
        <span class="fw-medium">€{{ delivery|floatformat:2 }}</span>
    </div>
    <hr class="custom-hr">
    <div class="d-flex justify-content-between text-cyan fw-bold fs-5 mb-2">
        <span>Grand Total</span>
        <span>€{{ grand_total|floatformat:2 }}</span>
    </div>
    {% if free_delivery_delta > 0 %}
    <div class="alert alert-warning py-2 px-3 small rounded-pill text-center mb-2">
        <i class="fa-solid fa-truck me-1"></i>
        Spend <strong>€{{ free_delivery_delta }}</strong> more for free delivery!
    </div>
    {% else %}
    <div class="alert alert-success py-2 px-3 small rounded-pill text-center mb-2">
        <i class="fa-solid fa-check-circle me-1"></i>
        You've unlocked <strong>free delivery!</strong>
    </div>
    {% endif %}
</div>
