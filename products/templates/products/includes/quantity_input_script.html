<script>
    // Quantity input control — vanilla JS (no jQuery)
    document.addEventListener('DOMContentLoaded', function () {

        function handleEnableDisable(itemId) {
            var input = document.getElementById('id_qty_' + itemId);
            if (!input) return;
            var currentValue = parseInt(input.value);
            var minusBtn = document.getElementById('decrement-qty_' + itemId);
            var plusBtn = document.getElementById('increment-qty_' + itemId);
            if (minusBtn) minusBtn.disabled = currentValue < 2;
            if (plusBtn) plusBtn.disabled = currentValue > 98;
        }

        // Init all quantity inputs
        document.querySelectorAll('.qty_input').forEach(function (input) {
            var itemId = input.dataset.item_id;
            handleEnableDisable(itemId);
            input.addEventListener('change', function () {
                handleEnableDisable(itemId);
            });
        });

        // Increment buttons
        document.querySelectorAll('.increment-qty').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var itemId = this.dataset.item_id;
                var input = document.getElementById('id_qty_' + itemId);
                if (input) {
                    input.value = Math.min(99, parseInt(input.value) + 1);
                    handleEnableDisable(itemId);
                }
            });
        });

        // Decrement buttons
        document.querySelectorAll('.decrement-qty').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var itemId = this.dataset.item_id;
                var input = document.getElementById('id_qty_' + itemId);
                if (input) {
                    input.value = Math.max(1, parseInt(input.value) - 1);
                    handleEnableDisable(itemId);
                }
            });
        });
    });
</script>
