{% if user.is_superuser %}
<form method="post" action="{% url 'delete_product' product.id %}">
  {% csrf_token %}
  <div class="modal fade" tabindex="-1" id="deletePageModal{{ product.id }}">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content neon-border">
        <div class="modal-header bg-purple-dark text-white">
          <h5 class="modal-title">
              <i class="fa-solid fa-triangle-exclamation text-danger me-2"></i>
              Delete Product
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" style="background: rgba(20,10,30,0.95);">
          <p class="text-white">You are about to permanently delete <strong>{{ product.name }}</strong>. This cannot be undone.</p>
          {% if product.image %}
          <div class="text-center mb-3">
              <img src="{{ product.image.url }}" alt="{{ product.name }}"
                  class="img-thumbnail" style="max-height: 150px; border-radius: 8px;">
          </div>
          {% endif %}
          <label for="confirm_username" class="form-label text-muted">Confirm your username <strong>{{ user.username }}</strong> to delete:</label>
          <input type="text" name="username" class="form-control" placeholder="Type your username here" required>
        </div>
        <div class="modal-footer" style="background: rgba(20,10,30,0.95);">
          <button type="button" class="btn btn-outline-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-danger rounded-pill">
              <i class="fa-solid fa-trash me-1"></i>Delete Product
          </button>
        </div>
      </div>
    </div>
  </div>
</form>
{% endif %}
