{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DigitalHub — Instant Digital Delivery{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #800080;
            --secondary: #da70d6;
            --accent: #ff69b4;
            --dark: #08080f;
            --card-bg: #10101a;
            --text: #e8e8f0;
        }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        h1,h2,h3,h4 { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
        .btn-digital { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: #fff; border-radius: 50px; padding: 0.6rem 1.5rem; font-weight: 600; transition: transform 0.2s; }
        .btn-digital:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(128,0,128,0.5); color: #fff; }
        .product-card { background: var(--card-bg); border: 1px solid rgba(128,0,128,0.3); border-radius: 16px; overflow: hidden; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(128,0,128,0.3); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .navbar-digital { background: rgba(8,8,15,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(128,0,128,0.2); }
        .nav-link-digital { color: var(--text) !important; font-weight: 500; }
        .nav-link-digital:hover { color: var(--accent) !important; }
        footer { background: var(--card-bg); border-top: 1px solid rgba(128,0,128,0.2); margin-top: 4rem; }
        .section-padding { padding: 4rem 0; }
        .digital-badge { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border-radius: 8px; padding: 0.5rem 1rem; font-weight: 600; }
        .text-digital-accent { color: var(--accent); }
    </style>
</head>
<body>
    {% include "store_components/digital_navbar.html" %}
    <main>{% block content %}{% endblock %}</main>
    {% include "store_components/digital_footer.html" %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
