{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PetShop Ireland 🇮🇪{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #228B22;
            --secondary: #2d9a3e;
            --accent: #90EE90;
            --warning: #FFA500;
            --dark: #0f1a0f;
            --card-bg: #1a2a1a;
            --text: #e8f5e9;
            --muted: #888;
        }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'Nunito', sans-serif; margin: 0; min-height: 100vh; }
        h1,h2,h3,h4,h5,h6 { font-family: 'Poppins', sans-serif; font-weight: 600; }
        .btn-pet { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: #fff; border-radius: 50px; padding: 0.6rem 1.5rem; font-weight: 600; transition: transform 0.2s; }
        .btn-pet:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(34,139,34,0.4); color: #fff; }
        .product-card { background: var(--card-bg); border: 1px solid rgba(34,139,34,0.3); border-radius: 16px; overflow: hidden; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(34,139,34,0.2); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; }
        .navbar-pet { background: rgba(15,26,15,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(34,139,34,0.2); }
        .nav-link-pet { color: var(--text) !important; font-weight: 500; }
        .nav-link-pet:hover { color: var(--accent) !important; }
        .dropdown-menu-custom { background: var(--card-bg); border: 1px solid rgba(34,139,34,0.3); border-radius: 12px; }
        .dropdown-item-custom { color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; }
        .dropdown-item-custom:hover { background: rgba(34,139,34,0.2); color: var(--accent); }
        footer { background: var(--card-bg); border-top: 1px solid rgba(34,139,34,0.2); margin-top: 4rem; }
        .text-pet-accent { color: var(--accent); }
        .section-padding { padding: 4rem 0; }
        .hero-pet { background: linear-gradient(135deg, #0f1a0f 0%, #1a3a1a 100%); }
    </style>
</head>
<body>
    {% include "store_components/pet_navbar.html" %}
    <main>{% block content %}{% endblock %}</main>
    {% include "store_components/pet_footer.html" %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
