<div class="col-md-6 col-lg-4">
    <div class="card bg-darker text-white rounded-4 overflow-hidden h-100 blog-card">
        {% if blog_page.image %}
        <a href="{% url 'blog_post' slug=blog_page.slug %}" class="d-block">
            <img src="{{ blog_page.image.url }}" class="card-img-top"
                 alt="{{ blog_page.title }}"
                 style="height: 180px; object-fit: cover;">
        </a>
        {% else %}
        <div class="bg-purple d-flex align-items-center justify-content-center"
             style="height: 180px;">
            <i class="fa-solid fa-blog text-white fa-4x"></i>
        </div>
        {% endif %}
        <div class="card-body p-3">
            <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                {% if blog_page.created_at %}
                <span class="text-muted small">
                    <i class="fa-solid fa-calendar me-1"></i>
                    {{ blog_page.created_at|date:"M d, Y" }}
                </span>
                {% endif %}
                <span class="text-cyan small">
                    <i class="fa-solid fa-clock me-1"></i>{{ blog_page.reading_time }}
                </span>
            </div>
            <h4 class="card-title text-white mb-2">
                <a href="{% url 'blog_post' slug=blog_page.slug %}"
                   class="text-white text-decoration-none hover-gold">
                    {{ blog_page.title }}
                </a>
            </h4>
            <p class="text-silver small mb-3">
                {{ blog_page.excerpt }}
            </p>
            <a href="{% url 'blog_post' slug=blog_page.slug %}"
               class="btn btn-sm btn-outline-cyan rounded-pill"
               aria-label="Read: {{ blog_page.title }}">
                Read: {{ blog_page.title|truncatewords:2 }} <i class="fa-solid fa-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</div>
